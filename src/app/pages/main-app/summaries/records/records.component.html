@let form = formData()!;

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="row g-4 mb-6 mx-4">
    <!-- from date -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-mat-datepicker-form
        label="FROM DATE"
        placeholder="Pick a date"
        [required]="true"
        [control]="form.controls['from_date']"
      ></app-mat-datepicker-form>
    </div>

    <!-- to date  -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-mat-datepicker-form
        label="TO DATE"
        placeholder="Pick a date"
        [required]="true"
        [control]="form.controls['to_date']"
      ></app-mat-datepicker-form>
    </div>

    <!-- submit button -->
    <div class="box-footer mt-4 d-flex justify-content-center">
      <app-submit-button> </app-submit-button>
    </div>
  </div>
</form>
<div class="col-md-12 mb-3 mt-4">
  <ngx-datatable
    #table
    class="material table-border"
    [rows]="records()"
    [columnMode]="ColumnMode.force"
    [headerHeight]="50"
    [footerHeight]="50"
    [rowHeight]="'auto'"
    [loadingIndicator]="loadingIndicator()"
    [scrollbarH]="true"
    [count]="totalRecords()"
  >
    <ngx-datatable-column prop="sr_no">
      <ng-template
        let-column="column"
        ngx-datatable-header-template
        let-sort="sortFn"
      >
        <span class="tableHeader">SR NO</span>
      </ng-template>
      <ng-template let-value="value" ngx-datatable-cell-template>
        {{ value }}
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column prop="date">
      <ng-template
        let-column="column"
        ngx-datatable-header-template
        let-sort="sortFn"
      >
        <span class="tableHeader">DATE</span>
      </ng-template>
      <ng-template let-value="value" ngx-datatable-cell-template>
        {{ value }}
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column prop="status">
      <ng-template
        let-column="column"
        ngx-datatable-header-template
        let-sort="sortFn"
      >
        <span class="tableHeader">STATUS</span>
      </ng-template>
      <ng-template let-value="value" ngx-datatable-cell-template>
        {{ value }}
      </ng-template>
    </ngx-datatable-column>

    <!-- year -->
    <ngx-datatable-column prop="period_text">
      <ng-template
        let-column="column"
        ngx-datatable-header-template
        let-sort="sortFn"
      >
        <span class="tableHeader">PERIOD</span>
      </ng-template>
      <ng-template let-value="value" ngx-datatable-cell-template>
        {{ value }}
      </ng-template>
    </ngx-datatable-column>
  </ngx-datatable>
</div>
