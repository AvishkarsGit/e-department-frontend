@let form = formData()!;

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="row g-4 mb-6 mx-4">
    <div class="form-group col-md-12" align="center">
      <!-- <app-toggle-form-button
        label="Status"
        [control]="form.controls['account_status']"
      >
      </app-toggle-form-button> -->
    </div>

    <div class="form-group col-md-12">
      <app-file-input
        label="PHOTO"
        [isOnlyImage]="true"
        [control]="form.controls['photo']"
        [required]="false"
      ></app-file-input>
    </div>

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="NAME"
        placeholder="Name"
        icon="user"
        [required]="true"
        [control]="form.controls['name']"
      ></app-input-form>
    </div>

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="EMAIL"
        type="email"
        placeholder="Email"
        icon="envelope"
        [required]="true"
        [control]="form.controls['email']"
      ></app-input-form>
    </div>

    <!-- phone -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="PHONE"
        type="number"
        placeholder="Phone Number"
        icon="phone"
        [required]="true"
        [control]="form.controls['phone']"
        [minlength]="10"
        [maxlength]="10"
      ></app-input-form>
    </div>

    <!-- phone -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="USERNAME"
        type="text"
        placeholder="Username"
        icon="user"
        [required]="true"
        [control]="form.controls['username']"
      ></app-input-form>
    </div>

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="PASSWORD"
        type="password"
        placeholder="Password"
        icon="key"
        [required]="updateItem() ? false : true"
        [control]="form.controls['password']"
        [minlength]="8"
      ></app-input-form>
    </div>

    <div class="col-xl-6 col-sm-6 col-12" formArrayName="phoneNumbers">
      @for (phone of phoneNumbers.controls;track $index ) {
      <div [formGroupName]="$index" class="mb-3">
        <div class="row g-2">
          <div class="col-md-8">
            <app-input-form
              class="form-control"
              type="number"
              placeholder="Phone number"
              formControlName="number"
            />
          </div>

          <div class="col-md-3">
            <select class="form-control" formControlName="type">
              <option value="home">Home</option>
              <option value="work">Work</option>
              <option value="mobile">Mobile</option>
            </select>
          </div>

          <div class="col-md-1">
            <button
              class="btn btn-danger"
              type="button"
              (click)="removePhoneNumber($index)"
            >
              Remove
            </button>
          </div>
        </div>

        <div>
          @let phoneNumber = phone.get('number'); @if (phoneNumber?.invalid &&
          phoneNumber?.touched) {
          <small class="text-danger">
            @if (phoneNumber?.hasError('pattern')) { phone number must be 10
            digit only } @else { phone number is required }
          </small>
          }
        </div>
      </div>
      }

      <button class="btn btn-primary" type="button" (click)="addPhoneNumber()">
        Add phone number
      </button>
    </div>

    <div class="box-footer mt-4 d-flex justify-content-center">
      <app-submit-button> </app-submit-button>
    </div>
  </div>
</form>
