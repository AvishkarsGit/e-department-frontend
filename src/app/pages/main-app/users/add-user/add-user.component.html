@let form = formData()!;

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="row g-4 mb-6 mx-4">
    <div class="form-group col-md-12" align="center">
      <app-toggle-form-button
        label="Status"
        [control]="form.controls['account_status']"
      >
      </app-toggle-form-button>
    </div>

    <div class="form-group col-md-12">
      <app-file-input
        label="PHOTO"
        [isOnlyImage]="true"
        [control]="form.controls['photo']"
        [required]="false"
      ></app-file-input>
    </div>

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="NAME"
        placeholder="Name"
        icon="user"
        [required]="true"
        [control]="form.controls['name']"
      ></app-input-form>
    </div>

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="EMAIL"
        type="email"
        placeholder="Email"
        icon="envelope"
        [required]="true"
        [control]="form.controls['email']"
      ></app-input-form>
    </div>

    <!-- username -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="USERNAME"
        type="text"
        placeholder="Username"
        icon="user"
        [required]="true"
        [control]="form.controls['username']"
      ></app-input-form>
    </div>

    <!-- phone -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="PHONE"
        type="number"
        placeholder="Phone Number"
        icon="phone"
        [required]="true"
        [control]="form.controls['phone']"
        [minlength]="10"
        [maxlength]="10"
      ></app-input-form>
    </div>

    <!-- roles -->
    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="ROLES"
        type="text"
        placeholder="User role"
        icon="user"
        [required]="true"
        [control]="form.controls['role']"
      ></app-input-form>
    </div>

    <!-- @if(!isSignup()) {
       <div class="col-xl-6 col-sm-6 col-12">
        <app-select-form
          label="ROLE"
          placeholder="Select Role"
          [required]="true"
          [control]="form.controls['role']"
          optionTextField="name"
          optionValueField="id"
          [items]="roles()"
        ></app-select-form>
      </div> 
    } -->

    <div class="col-xl-6 col-sm-6 col-12">
      <app-input-form
        label="PASSWORD"
        type="password"
        placeholder="Password"
        icon="key"
        [required]="updateItem() ? false : true"
        [control]="form.controls['password']"
        [minlength]="8"
      ></app-input-form>
    </div>

    <div class="box-footer mt-4 d-flex justify-content-center">
      <app-submit-button> </app-submit-button>
    </div>
  </div>
</form>
