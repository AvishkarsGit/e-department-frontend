<form [formGroup]="formData()!" class="auth-form">
  <h1>Sign in</h1>

  <input formControlName="email" type="email" placeholder="Email" />
  <input formControlName="password" type="password" placeholder="Password" />

  <a type="button" (click)="resetPassword()">Forgot your password? </a>

  @if(isLogin()) {
  <mat-spinner class="signin" color="warn" [diameter]="50"></mat-spinner>
  } @else {
  <button class="signin auth-button" (click)="onSubmit()">Sign In</button>
  }
</form>
