@let formData = resetPasswordForm()!;

<form
  class="auth-form"
  [formGroup]="formData"
  (ngSubmit)="onResetPasswordSubmit()"
>
  <div class="row g-4 pb-4 m-2 mb-4">
    <div class="col-xl-12 col-sm-12 col-12">
      <div class="col-xl-6 col-sm-6 col-12 offset-xl-3 offset-sm-3">
        <!-- Title & Subtitle -->
        <div class="mb-4">
          <h3 class="fs-4 fw-bold mb-2">{{ model().title }}</h3>
          <p class="text-muted">{{ model().subTitle }}</p>
        </div>

        @let flag = model().flag; 
        
        @if(flag === 1) {

        <!-- email input -->
        <app-input-form
          type="email"
          icon="envelope"
          placeholder="Email"
          [control]="formData.controls['email']"
        ></app-input-form>

        } @else if(flag === 2) {

        <!-- otp -->
         <div class="d-flex justify-content-center">
           <app-otp-input [control]="formData.controls['otp']"> </app-otp-input>
         </div>

        } @else {

        <!-- password input -->
        <app-input-form
          type="password"
          placeholder="Password"
          icon="key"
          [control]="formData.controls['password']"
          [minlength]="8"
        ></app-input-form>

        }
      </div>

      <div class="box-footer mt-4 d-flex justify-content-center">
        <app-submit-button></app-submit-button>
      </div>
    </div>
  </div>
</form>
